<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300..700&display=swap" rel="stylesheet">

    <link rel="stylesheet" href="style.css">

    <title>Character Counter Component</title>
</head>
<body>

<header class="header">

     <!-- Encabezado componente -->
    <section class="content">
        <div class="logo">
            <h1 class="character">Character Counter</h1>
            <button class="theme-button">☀</button>
        </div>
        
    </section>

</header>

<main class="main">
     
    <div class="title">
        <h1>Analyze your text in real-time.</h1> 
    </div>

        <!-- Cuadro de Entrada de Texto -->

    <section class="text">
        <textarea class="text-area">
            Design is the silent ambassador of your brand.
            Simplicity is key to effective communication,
            creating clarity in every interaction.
            A great design transforms complex ideas into
            elegant solutions, making them easy to
            understand. It blends aesthetics and
            functionality seamlessly.
        </textarea>
    </section>

    <!-- Botones cheks y visualización de tiempo aproximado -->

    <section class="checks">
        <div class="options">

            <label class="checkbox">
                <input type="checkbox">
                Exclude Spaces
            </label>

            <label class="checkbox">
                <input type="checkbox">
                Set Character Limit
            </label>

        </div>

        <div class="reading-time">
            Approx. reading time: 1 min
        </div>       
    </section>

    <!-- Segmento de tarjetas de contadores --> 

    <section class="cards">
        <div class="card-purple">
            <h2>278</h2>
            <p>Total Characters</p>
        </div>

        <div class="card-orange">
            <h2>39</h2>
            <p>Word Count</p>
        </div>

        <div class="card-darkorange">
            <h2>04</h2>
            <p>Sentence Count</p>
        </div>

    </section>

    <!-- Segmento de Porcentaje de Letras --> 
    
    
    
    <section class="density">

        <h3>Letter Density</h3>

        <ul>
        <li class="density-row">
            <span>E</span>
            <div class="bar">
                <div class="fill" style="width:16.06%"></div>
            </div>
            <span>40 (16.06%)</span>
        </li>

        <li class="density-row">
            <span>I</span>
            <div class="bar">
                <div class="fill" style="width:11.65%"></div>
            </div>
            <span>29 (11.65%)</span>
        </li>

        <li class="density-row">
            <span>T</span>
            <div class="bar">
                <div class="fill" style="width:11.24%"></div>
            </div>
            <span>28 (11.24%)</span>
        </li>

        <li class="density-row">
            <span>O</span>
            <div class="bar">
                <div class="fill" style="width:8.84%"></div>
            </div>
            <span>22 (8.84%)</span>
        </li>

        <li class="density-row">
            <span>N</span>
            <div class="bar">
                <div class="fill" style="width:8.43%"></div>
            </div>
            <span>21 (8.43%)</span>
        </li>

        </ul>
        <button class="see-more">
            See more ↓
        </button>    

    </section>

</main>

</body>
</html>
