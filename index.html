<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300..700&display=swap" rel="stylesheet">

    <link rel="stylesheet" href="style.css">

    <title>Character Counter Component</title>
</head>
<body>

<header class="header">

     <!-- Encabezado componente -->

        <div class="logo">
            <img class="img-logo" src="./assets/icono-logo.png" alt="icono del logo">
            <h1 class="character">Character Counter</h1>
        </div>
            
            <button class="theme-button">☀</button>

</header>

<main class="main">
     
    <div class="title">
        <h1>Analyze your text in real-time.</h1> 
    </div>

        <!-- Cuadro de Entrada de Texto -->

    <section class="text">
        <textarea class="text-area">
            Design is the silent ambassador of your brand. Simplicity is key to effective 
            communication, creating clarity in every interaction. A great design 
            transforms complex ideas into elegant solutions, making them easy to
            understand. It blends aesthetics and functionality seamlessly.
        </textarea>
    </section>

    <!-- Botones cheks y visualización de tiempo aproximado -->

    <section class="checks">
        <div class="options">

            <label class="checkbox">
                <input type="checkbox">
                Exclude Spaces
            </label>

            <label class="checkbox">
                <input type="checkbox">
                Set Character Limit
            </label>

        </div>

        <div class="reading-time">
            Approx. reading time: &lt; 1 min
        </div>       
    </section>

    <!-- Segmento de tarjetas de contadores --> 

    <section class="cards">
        <div class="card" id="purple">
            <h2>278</h2>
            <p>Total Characters</p>
        </div>

        <div class="card" id="orange">
            <h2>39</h2>
            <p>Word Count</p>
        </div>

        <div class="card" id="darkorange">
            <h2>04</h2>
            <p>Sentence Count</p>
        </div>

    </section>

    <!-- Segmento de Porcentaje de Letras --> 
    
    
    
    <section class="density">
        <div class="letter-density">
        <h3>Letter Density</h3>
        </div>
        <ul class="density-list">
            <li class="density-item">
                <span class="letter">E</span>
                <div class="progress">
                    <div class="progress-fill w16"></div>
                </div>
                <span class="value">40 (16.06%)</span>
            </li>

            <li class="density-item">
                <span class="letter">I</span>
                <div class="progress">
                    <div class="progress-fill w12"></div>
                </div>
                <span class="value">29 (11.65%)</span>
            </li>

            <li class="density-item">
                <span class="letter">T</span>
                <div class="progress">
                    <div class="progress-fill w11"></div>
                </div>
                <span class="value">28 (11.24%)</span>
            </li>

            <li class="density-item">
                <span class="letter">O</span>
                <div class="progress">
                    <div class="progress-fill w9"></div>
                </div>
                <span class="value">22 (8.84%)</span>
            </li>

            <li class="density-item">
                <span class="letter">N</span>
                <div class="progress">
                    <div class="progress-fill w8"></div>
                </div>
                <span class="value">21 (8.43%)</span>
            </li>

        </ul>

        <a href="#" class="see-more">
            See more ▼
        </a>

    </section>
</main>

</body>
</html>
